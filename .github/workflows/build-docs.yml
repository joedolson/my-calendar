name: Extract WordPress Hooks

on:
  push:
    branches: [ main, master ]
    paths: [ '**.php' ]
  workflow_dispatch:

jobs:
  extract-hooks:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push to wiki repository
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: akirk/extract-wp-hooks@main
      with:
        base-dir: "src"
        exclude-dirs: "vendor,src/vendor"
        ignore-filters: "debug_hook,internal_filter"
        section: "file"
        wiki-repo: "joedolson/my-calendar.wiki.git"